<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Legra importer</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <header>
        <h1>Legra</h1>
        <p id="status">Inspecting current tab...</p>
      </header>

      <section class="result">
        <dl>
          <dt>Title</dt>
          <dd id="title">-</dd>
          <dt>DOI</dt>
          <dd id="doi">-</dd>
          <dt>arXiv</dt>
          <dd id="arxiv">-</dd>
          <dt>PDF</dt>
          <dd id="pdf">-</dd>
        </dl>
      </section>

      <section class="category-panel">
        <label>
          Existing category
          <select id="categorySelect">
            <option value="">No category</option>
          </select>
        </label>

        <label>
          New category
          <input id="categoryNew" placeholder="optional/category" />
        </label>
      </section>

      <button id="import" type="button">Import to Legra</button>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
