<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>paper-manager importer</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <header>
        <h1>paper-manager</h1>
        <p id="status">Inspecting current tab...</p>
      </header>

      <section class="result">
        <dl>
          <dt>Title</dt>
          <dd id="title">-</dd>
          <dt>DOI</dt>
          <dd id="doi">-</dd>
          <dt>arXiv</dt>
          <dd id="arxiv">-</dd>
          <dt>PDF</dt>
          <dd id="pdf">-</dd>
        </dl>
      </section>

      <label>
        Folder category
        <input id="category" placeholder="optional/category" />
      </label>

      <button id="import" type="button">Import to paper-manager</button>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
