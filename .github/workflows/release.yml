name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - name: Build native host
        working-directory: src-tauri
        run: |
          cargo build --release --bin paper_manager_native_host
          mkdir -p release-resources
          cp target/release/paper_manager_native_host release-resources/paper_manager_native_host
      - name: Build macOS app
        run: npm run tauri build -- --bundles app --config '{"bundle":{"resources":{"release-resources/paper_manager_native_host":"paper_manager_native_host"}}}'
      - name: Prepare macOS asset
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          mkdir -p release-assets
          ditto -c -k --sequesterRsrc --keepParent \
            src-tauri/target/release/bundle/macos/Legra.app \
            "release-assets/Legra_${VERSION}_aarch64.app.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: legra-macos
          path: release-assets/*

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - name: Build native host
        working-directory: src-tauri
        shell: pwsh
        run: |
          cargo build --release --bin paper_manager_native_host
          New-Item -ItemType Directory -Force release-resources
          Copy-Item target/release/paper_manager_native_host.exe release-resources/paper_manager_native_host.exe
      - name: Build Windows installer
        run: npm run tauri build -- --bundles nsis --config '{"bundle":{"resources":{"release-resources/paper_manager_native_host.exe":"paper_manager_native_host.exe"}}}'
      - name: Prepare Windows asset
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $source = Get-ChildItem src-tauri/target/release/bundle/nsis/*-setup.exe | Select-Object -First 1
          New-Item -ItemType Directory -Force release-assets
          Copy-Item $source.FullName "release-assets/Legra_${version}_windows_x86_64-setup.exe"
      - uses: actions/upload-artifact@v4
        with:
          name: legra-windows
          path: release-assets/*

  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libssl-dev patchelf
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - name: Build native host
        working-directory: src-tauri
        run: |
          cargo build --release --bin paper_manager_native_host
          mkdir -p release-resources
          cp target/release/paper_manager_native_host release-resources/paper_manager_native_host
      - name: Build Linux packages
        run: npm run tauri build -- --bundles appimage,deb --config '{"bundle":{"resources":{"release-resources/paper_manager_native_host":"paper_manager_native_host"}}}'
      - name: Prepare Linux assets
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          mkdir -p release-assets
          cp "$(find src-tauri/target/release/bundle/appimage -name '*.AppImage' -print -quit)" \
            "release-assets/Legra_${VERSION}_linux_x86_64.AppImage"
          cp "$(find src-tauri/target/release/bundle/deb -name '*.deb' -print -quit)" \
            "release-assets/Legra_${VERSION}_linux_amd64.deb"
      - uses: actions/upload-artifact@v4
        with:
          name: legra-linux
          path: release-assets/*

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [macos, windows, linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: legra-*
          path: release-assets
          merge-multiple: true
      - name: Generate checksums
        working-directory: release-assets
        run: sha256sum * > SHA256SUMS.txt
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          draft: false
          prerelease: false
          generate_release_notes: true
