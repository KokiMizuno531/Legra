name: Publish v0.1.3

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/publish-v0.1.3.yml"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Publish v0.1.3 release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit v0.1.3 --draft=false --latest --repo "$GITHUB_REPOSITORY"
