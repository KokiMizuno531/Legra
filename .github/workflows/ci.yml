name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Check Tauri backend
        working-directory: src-tauri
        run: cargo check

      - name: Check Chrome native host
        working-directory: src-tauri
        run: cargo check --bin paper_manager_native_host

      - name: Check Chrome extension JavaScript
        run: |
          node --check chrome-extension/service_worker.js
          node --check chrome-extension/popup.js
